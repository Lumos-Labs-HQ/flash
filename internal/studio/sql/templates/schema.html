<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schema - FlashORM Studio</title>
    <link rel="icon" type="image/webp" href="/common/static/image/logo.webp">
    <link rel="stylesheet" href="/cdn/fonts/fonts.css">
    <link rel="stylesheet" href="/common/static/css/base.css">
    <link rel="stylesheet" href="/static/css/schema.css">
    <script src="/cdn/iconify/iconify.min.js"></script>
</head>
<body>
    <div class="left-navbar">
        <img src="/common/static/image/logo.webp" alt="FlashORM" class="left-navbar-logo">
        <a href="/" class="left-navbar-link"><span class="iconify" data-icon="mdi:table"></span><span class="tooltip">Data</span></a>
        <a href="/sql" class="left-navbar-link"><span class="iconify" data-icon="mdi:code-braces"></span><span class="tooltip">SQL Editor</span></a>
        <a href="/schema" class="left-navbar-link active"><span class="iconify" data-icon="mdi:file-tree"></span><span class="tooltip">Schema</span></a>
        <a href="/metrics" class="left-navbar-link"><span class="iconify" data-icon="mdi:chart-line"></span><span class="tooltip">Metrics</span></a>
    </div>

    <div class="schema-topbar">
        <span class="schema-title">Database Schema</span>
        <div class="schema-topbar-center">
            <input type="text" id="table-search" class="schema-search" placeholder="Search tables…">
        </div>
        <div class="schema-topbar-right">
            <span id="stats" class="schema-stats">Loading…</span>
            <select id="layout-selector" class="scbtn" onchange="schemaCanvas?.organizeLayout(this.value)" title="Layout">
                <option value="" disabled selected>Layout</option>
                <option value="hierarchical">Hierarchical</option>
                <option value="grid">Grid</option>
                <option value="circular">Circular</option>
                <option value="force">Force-Directed</option>
                <option value="horizontal">Horizontal</option>
                <option value="compact">Compact</option>
            </select>
            <button class="scbtn" onclick="schemaCanvas?.zoomIn()" title="Zoom In"><span class="iconify" data-icon="mdi:magnify-plus"></span></button>
            <button class="scbtn" onclick="schemaCanvas?.zoomOut()" title="Zoom Out"><span class="iconify" data-icon="mdi:magnify-minus"></span></button>
            <button class="scbtn" onclick="schemaCanvas?.resetView()" title="Fit to screen"><span class="iconify" data-icon="mdi:fit-to-screen"></span></button>
            <button class="scbtn" onclick="window.location.reload()"><span class="iconify" data-icon="mdi:refresh"></span></button>
        </div>
    </div>

    <div id="root">
        <div class="schema-loading">
            <div class="spinner"></div>
            <div>Loading schema…</div>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu" class="schema-context-menu" style="display:none;">
        <div class="ctx-item" onclick="schemaCanvas?.organizeLayout('hierarchical')">Hierarchical</div>
        <div class="ctx-item" onclick="schemaCanvas?.organizeLayout('grid')">Grid</div>
        <div class="ctx-item" onclick="schemaCanvas?.organizeLayout('circular')">Circular</div>
        <div class="ctx-item" onclick="schemaCanvas?.organizeLayout('force')">Force-Directed</div>
        <div class="ctx-item" onclick="schemaCanvas?.organizeLayout('horizontal')">Horizontal</div>
        <div class="ctx-item" onclick="schemaCanvas?.organizeLayout('compact')">Compact</div>
    </div>

    <!-- Edit Panel -->
    <div id="edit-panel" class="edit-panel">
        <div class="panel-header">
            <div class="panel-title">
                <span class="iconify" data-icon="mdi:table-edit"></span>
                <span id="panel-table-name">Edit Table</span>
            </div>
            <button class="panel-close" onclick="closeEditPanel()">×</button>
        </div>
        <div class="panel-content" id="panel-content"></div>
    </div>

    <script src="/common/static/js/common.js"></script>
    <script src="/static/js/schema-canvas.js"></script>
    <script src="/static/js/modal.js"></script>
    <script src="/static/js/schema-panel.js"></script>
</body>
</html>
